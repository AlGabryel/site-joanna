<style>
  :root{
    --dourado:#c9a24d;
    --roxo:#883481;

  /* RESET */
  *{

    padding:0;

  }

    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    margin:0;
    background: linear-gradient(
      to bottom,
      #f5efe6,
      #efe4d6
    );
    position: relative;
    overflow-x: hidden;
  }

  body::before{
    content:"";
    position: fixed;
    inset: 0;
    background: url('joanna.jpg') center/cover no-repeat;
    opacity: 0.15;   /* desktop */
    z-index: -1;
  }



  /* LAYOUT GERAL */
  .layout{ 
    display: flex;
    min-height: 100vh;
    overflow: hidden;
  }

  /* FOTO LADO ESQUERDO */
  .foto-lateral{
    flex:1;
    background:url('joanna.jpg') left center / 100% auto no-repeat;
  }

    flex:1;

        rgba(201,162,77,.18),
        rgba(255,255,255,.78) 45%,
        rgba(255,255,255,.75)

    backdrop-filter:blur(6px);
    box-shadow:var(--sombra-suave);
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding: 40px 50px;
    max-height: 100vh;
  }

  /* TEXTOS */

  }

  h1 span{
    color:var(--dourado);
  }

  p{

    font-size:15px;
    margin-bottom:35px;
  }

  /* BOTÕES */
  .btn{
    display:block;
    margin:14px 0;
    padding:15px 0;
    border-radius:40px;
    border:1px solid var(--dourado);
    text-decoration:none;
    text-align:center;
    color:var(--dourado);
    font-weight:500;
    transition:all .4s ease;
  }

  .btn:hover{
    background:var(--dourado);
    color:#fff;
    transform:translateY(-3px);
    box-shadow:var(--sombra-hover);
  }

  .inst {
    display:block;
    margin:14px 0;
    padding:15px 0;
    border-radius:40px;
    border:1px solid var(--roxo);
    text-decoration:none;
    text-align:center;

  .wats {

    margin:14px 0;
    padding:15px 0;
    border-radius:40px;
    border:1px solid var(--verde);
    text-decoration:none;
    text-align:center;
    color: rgb(32, 126, 110);
    font-weight:500;
    transition:all .4s ease;
  }

  .inst:hover{
    background:var(--roxo);
    color:#fff;
    transform:translateY(-3px);
    box-shadow:var(--sombra-hover);
  }

  .wats:hover{
    background:var(--verde);

  height: 60px;
  background: linear-gradient(135deg, #25d366, #1ebe5d);
  color: #fff;
  font-size: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
  z-index: 999;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.whatsapp-fixo:hover {
  transform: scale(1.1);
  box-shadow: 0 12px 25px rgba(0, 0, 0, 0.35);
}

.localizacao {
  margin-top: 18px;
  max-width: 900px;
  padding-top: 12px;
  border-top: 1px solid rgba(0,0,0,.06);
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(8px);
  border-radius: 24px;
  text-align: center;
}

.localizacao h1 {

.localizacao p {

}

.mapa {

.mapa iframe {

}


@media(max-width:900px){

  /* remove imagem de fundo */
  .foto-lateral{
    display: none;
    width: 100%;
    height: 240px;
    background-size: contain;
    background-position: center top;
  }

  /* mantém o degradê elegante */
  body{
    background:
      radial-gradient(circle at left center, rgba(201,162,77,.12), transparent 55%),
      radial-gradient(circle at right bottom, rgba(0,0,0,.08), transparent 60%),
      #f7f4ec;
      overflow: hidden;
      overflow-y: auto;
  }

  body::before{
    opacity: 0.55; /* mobile */
  }



  .layout{
    flex-direction: column;
    min-height: auto;
    overflow: visible;
  }

  .foto-perfil{
    display: block;
    width: 200px;
    height: 200px;
    margin: 10px auto 20px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center 15%;
    border: 2px solid var(--dourado);
    box-shadow: 0 12px 30px rgba(0,0,0,.2);
  }

  .conteudo{
    padding: 35px 20px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(6px);
    border-radius: 20px;
    text-align: center;
    max-height: none;
    padding: 25px 20px 35px;
  }
}

  .localizacao {
    padding: 30px 20px;
    margin-bottom: 10px;
  }

  .mapa iframe {

  }




</style>
